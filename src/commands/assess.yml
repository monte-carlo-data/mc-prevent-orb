---
description: >
  Run MC Prevent to assess data pipeline
  risk for a pull request. Polls for the
  PR agent assessment, applies the gate
  policy, and reports a verdict. Caches
  the verdict so subsequent commits reuse
  it without polling.

parameters:
  api-url:
    type: string
    default: >-
      https://api.getmontecarlo.com/ci/assess
    description: >
      Monte Carlo MC Prevent API URL.
  poll-interval:
    type: integer
    default: 30
    description: >
      Seconds between poll attempts when
      waiting for PR agent assessment.
  max-wait:
    type: integer
    default: 300
    description: >
      Maximum seconds to wait for PR agent
      assessment before giving up.
  fail-on-error:
    type: boolean
    default: true
    description: >
      Deprecated — use fail-on instead.
      false = fail-on: none.
      true is a no-op (defers to fail-on).
  fail-on:
    type: string
    default: ""
    description: >
      Which verdicts cause the job to exit
      non-zero: warn_and_fail, fail_only,
      or none. When left as the empty
      string this parameter is not sent
      to the backend, and the Monte
      Carlo UI's fail_on setting applies.
      Setting any of the three values
      overrides the UI.
  exempt-tables:
    type: string
    default: ""
    description: >
      Comma-separated table names to
      exclude from gate evaluation.
  min-risk-tier:
    type: string
    default: ""
    description: >
      Minimum risk tier to act on.
      Valid values: low, medium, high.
      When left unset the Monte Carlo UI's
      min_risk_tier setting applies.
      Setting any value overrides the UI.

steps:
  - restore_cache:
      keys:
        - mc-prevent-{{ .Branch }}-
  - run:
      name: "\u26a0\ufe0f MC Prevent"
      no_output_timeout: 6m
      environment:
        MC_API_URL: << parameters.api-url >>
        POLL_INTERVAL: << parameters.poll-interval >>
        MAX_WAIT: << parameters.max-wait >>
        FAIL_ON_ERROR: << parameters.fail-on-error >>
        FAIL_ON: << parameters.fail-on >>
        EXEMPT_TABLES: << parameters.exempt-tables >>
        MIN_RISK_TIER: << parameters.min-risk-tier >>
      command: |
        if [ -z "$CIRCLE_PULL_REQUEST" ]; then
          echo "Not a PR build. Skipping."
          exit 0
        fi

        MCD_ID="${MCD_DEFAULT_API_ID}"
        MCD_TK="${MCD_DEFAULT_API_TOKEN}"
        if [ -z "$MCD_ID" ] || [ -z "$MCD_TK" ]; then
          echo "Credentials not configured."
          exit 0
        fi

        PR=$(echo "$CIRCLE_PULL_REQUEST" \
          | grep -oE '[0-9]+$')
        OWN="${CIRCLE_PROJECT_USERNAME}"
        RNM="${CIRCLE_PROJECT_REPONAME}"
        REPO="${OWN}/${RNM}"
        CF="/tmp/mc-prevent-verdict.json"

        # Resolve effective fail-on before the API call. fail-on is only
        # sent when the user explicitly sets it — unset means "defer to
        # UI setting". fail-on-error is a deprecated shim: false → none.
        EFF="$FAIL_ON"
        if [ -z "$EFF" ]; then
          if [ "$FAIL_ON_ERROR" = "false" ] \
            || [ "$FAIL_ON_ERROR" = "0" ]; then
            EFF="none"
          fi
        fi

        echo "PR #${PR} on ${REPO}"
        echo "Retrieving assessment..."
        sleep "$POLL_INTERVAL"
        WAITED="$POLL_INTERVAL"

        while true; do
          RESP=$(curl -s -w "\n%{http_code}" \
            --max-time 25 \
            -X POST "${MC_API_URL}" \
            -H "x-mcd-id: ${MCD_ID}" \
            -H "x-mcd-token: ${MCD_TK}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg r "$REPO" \
              --argjson p "$PR" \
              --arg s "$CIRCLE_SHA1" \
              --arg exempt "$EXEMPT_TABLES" \
              --arg min_tier "$MIN_RISK_TIER" \
              --arg fail_on "$EFF" \
              '{
                repository: $r,
                pr_number: $p,
                commit_sha: $s
              }
              | if $exempt != "" then
                  . + {exempt_tables: ($exempt
                    | split(",")
                    | map(gsub("^\\s+|\\s+$"; "")))}
                else . end
              | if $min_tier != "" then
                  . + {min_risk_tier: $min_tier}
                else . end
              | if $fail_on != "" then
                  . + {fail_on: $fail_on}
                else . end')" 2>/dev/null) || true

          HC=$(echo "$RESP" | tail -1)
          BD=$(echo "$RESP" | sed '$d')

          if ! echo "$BD" \
            | jq . >/dev/null 2>&1; then
            BD=""
            SRC="error"
          else
            SRC=$(echo "$BD" \
              | jq -r \
                '.assessment_source // "error"')
          fi

          if [ "$SRC" != "none" ] \
            && [ "$SRC" != "error" ]; then
            echo "$BD" > "$CF"
            break
          fi

          if [ -f "$CF" ]; then
            echo "Using cached assessment."
            BD=$(cat "$CF")
            HC=200
            SRC=$(echo "$BD" \
              | jq -r \
                '.assessment_source // "cached"')
            break
          fi

          WAITED=$((WAITED + POLL_INTERVAL))
          if [ "$WAITED" -ge "$MAX_WAIT" ]; then
            echo "No assessment available."
            break
          fi

          sleep "$POLL_INTERVAL"
        done

        echo "$BD" \
          > /tmp/mc-prevent-raw-response.json

        CL=$(echo "$BD" | jq -r \
          '.conclusion // "error"' \
          2>/dev/null || echo "error")
        RT=$(echo "$BD" | jq -r \
          '.risk_tier // "none"' \
          2>/dev/null || echo "none")
        HS=$(echo "$BD" | jq -r \
          '.human_summary // ""' \
          2>/dev/null || echo "")
        SM=$(echo "$BD" | jq -r \
          '.summary // ""' \
          2>/dev/null || echo "")
        DS="${HS:-$SM}"
        PS=$(echo "$DS" \
          | sed 's/\*\*//g; s/\*//g; s/`//g')

        echo ""
        echo "==========================="
        echo " MC Prevent CI Check Result"
        echo "==========================="
        echo ""
        echo "Conclusion: ${CL}"
        echo "Risk tier:  ${RT}"
        echo ""
        echo "${PS}"
        echo ""
        echo "==========================="

        # The backend has already merged CI and UI fail_on and applied
        # it to the verdict, so we just exit based on the final conclusion.
        if [ "$CL" = "fail" ]; then
          echo ""
          echo "FAIL. Add mc-override."
          exit 1
        elif [ "$CL" = "warn" ]; then
          echo ""
          echo "WARNING. Review first."
          exit 1
        fi

  - run:
      name: Raw API response (click to expand)
      when: always
      command: |
        F=/tmp/mc-prevent-raw-response.json
        if [ -f "$F" ]; then
          jq . "$F" 2>/dev/null || cat "$F"
        else
          echo "No response available."
        fi

  - save_cache:
      when: always
      key: mc-prevent-{{ .Branch }}-{{ epoch }}
      paths:
        - /tmp/mc-prevent-verdict.json
