description: >
  Call the Monte Carlo MC Prevent API to assess data pipeline risk for a pull request.
  Polls for a PR agent assessment, applies the gate policy, and reports the verdict.
  Caches the verdict so subsequent commits reuse it without polling.

parameters:
  api-url:
    type: string
    default: "https://api.getmontecarlo.com/ci/assess"
    description: Monte Carlo MC Prevent API URL.
  poll-interval:
    type: integer
    default: 30
    description: Seconds between poll attempts when waiting for PR agent assessment.
  max-wait:
    type: integer
    default: 300
    description: Maximum seconds to wait for PR agent assessment before giving up.
  fail-on-error:
    type: boolean
    default: true
    description: Whether to fail the job if the gate returns "fail".

steps:
  - restore_cache:
      keys:
        - mc-prevent-{{ .Branch }}-
  - run:
      name: MC Prevent
      no_output_timeout: 6m
      environment:
        MC_API_URL: << parameters.api-url >>
        POLL_INTERVAL: << parameters.poll-interval >>
        MAX_WAIT: << parameters.max-wait >>
        FAIL_ON_ERROR: << parameters.fail-on-error >>
      command: |
        if [ -z "$CIRCLE_PULL_REQUEST" ]; then
          echo "Not a pull request build. Skipping MC Prevent."
          exit 0
        fi

        PR_NUMBER=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$')
        REPO="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
        CACHE_FILE="/tmp/mc-prevent-verdict.json"

        echo "PR #${PR_NUMBER} on ${REPO} at commit ${CIRCLE_SHA1}"
        echo "Retrieving MC Prevent assessment..."
        sleep ${POLL_INTERVAL}
        WAITED=${POLL_INTERVAL}

        while true; do
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 25 -X POST "${MC_API_URL}" \
            -H "x-mcd-id: ${MCD_DEFAULT_API_ID}" \
            -H "x-mcd-token: ${MCD_DEFAULT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "$REPO" \
              --argjson pr "$PR_NUMBER" \
              --arg sha "$CIRCLE_SHA1" \
              '{repository:$repo, pr_number:$pr, commit_sha:$sha}'
            )" 2>/dev/null) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if ! echo "$BODY" | jq . > /dev/null 2>&1; then
            BODY=""
            SOURCE="error"
          else
            SOURCE=$(echo "$BODY" | jq -r '.assessment_source // "error"')
          fi

          # Got a real verdict — save to cache and use it
          if [ "$SOURCE" != "none" ] && [ "$SOURCE" != "error" ]; then
            echo "$BODY" > "$CACHE_FILE"
            break
          fi

          # No assessment yet — check if we have a cached verdict from a previous run
          if [ -f "$CACHE_FILE" ]; then
            echo "Using cached assessment from previous run."
            BODY=$(cat "$CACHE_FILE")
            HTTP_CODE=200
            SOURCE=$(echo "$BODY" | jq -r '.assessment_source // "cached"')
            break
          fi

          WAITED=$((WAITED + POLL_INTERVAL))
          if [ "$WAITED" -ge "$MAX_WAIT" ]; then
            echo "No assessment available. Defaulting to pass."
            break
          fi

          sleep ${POLL_INTERVAL}
        done

        # Save raw response for the detail step
        echo "$BODY" > /tmp/mc-prevent-raw-response.json

        # Parse result
        CONCLUSION=$(echo "$BODY" | jq -r '.conclusion // "error"' 2>/dev/null || echo "error")
        RISK_TIER=$(echo "$BODY" | jq -r '.risk_tier // "none"' 2>/dev/null || echo "none")
        HUMAN_SUMMARY=$(echo "$BODY" | jq -r '.human_summary // ""' 2>/dev/null || echo "")
        SUMMARY=$(echo "$BODY" | jq -r '.summary // ""' 2>/dev/null || echo "")
        DISPLAY_SUMMARY="${HUMAN_SUMMARY:-$SUMMARY}"
        # Strip markdown for plain text output
        PLAIN_SUMMARY=$(echo "$DISPLAY_SUMMARY" | sed 's/\*\*//g; s/\*//g; s/`//g')

        echo ""
        echo "==========================================="
        echo " MC Prevent CI Check Result"
        echo "==========================================="
        echo ""
        echo "Conclusion: ${CONCLUSION}"
        echo "Risk tier:  ${RISK_TIER}"
        echo ""
        echo "${PLAIN_SUMMARY}"
        echo ""
        echo "==========================================="

        # Persist conclusion for fail check
        echo "export MC_PREVENT_CONCLUSION=${CONCLUSION}" >> "$BASH_ENV"

  - run:
      name: Raw API response (click to expand)
      command: |
        if [ -f /tmp/mc-prevent-raw-response.json ]; then
          cat /tmp/mc-prevent-raw-response.json | jq . 2>/dev/null || cat /tmp/mc-prevent-raw-response.json
        else
          echo "No response available."
        fi

  - run:
      name: MC Prevent gate check
      command: |
        FAIL_ON_ERROR="${FAIL_ON_ERROR:-true}"
        if [ "$MC_PREVENT_CONCLUSION" = "fail" ] && [ "$FAIL_ON_ERROR" = "true" ]; then
          echo "MC Prevent failed. Add 'mc-override' label to bypass."
          exit 1
        fi

  - save_cache:
      key: mc-prevent-{{ .Branch }}-{{ epoch }}
      paths:
        - /tmp/mc-prevent-verdict.json
