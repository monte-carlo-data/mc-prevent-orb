---
description: >
  Run MC Prevent as a standalone job.
  Assesses data pipeline risk for the
  current pull request.

executor: default

parameters:
  api-url:
    type: string
    default: >-
      https://api.getmontecarlo.com/ci/assess
    description: MC Prevent API URL.
  poll-interval:
    type: integer
    default: 30
    description: Seconds between poll attempts.
  max-wait:
    type: integer
    default: 300
    description: Max seconds to wait.
  fail-on-error:
    type: boolean
    default: true
    description: >
      Deprecated — use fail-on instead.
  fail-on:
    type: enum
    enum:
      - "warn_and_fail"
      - "fail_only"
      - "none"
    default: "warn_and_fail"
    description: >
      Which verdicts cause the job to exit
      non-zero.
  exempt-tables:
    type: string
    default: ""
    description: >
      Comma-separated table names to
      exclude from gate evaluation.
  min-risk-tier:
    type: enum
    enum:
      - "low"
      - "medium"
      - "high"
    default: "low"
    description: >
      Minimum risk tier to act on.

steps:
  - assess:
      api-url: << parameters.api-url >>
      poll-interval: << parameters.poll-interval >>
      max-wait: << parameters.max-wait >>
      fail-on-error: << parameters.fail-on-error >>
      fail-on: << parameters.fail-on >>
      exempt-tables: << parameters.exempt-tables >>
      min-risk-tier: << parameters.min-risk-tier >>
