---
description: >
  Run MC Prevent as a standalone job.
  Assesses data pipeline risk for the
  current pull request.

executor: default

parameters:
  api-url:
    type: string
    default: >-
      https://api.getmontecarlo.com/ci/assess
    description: MC Prevent API URL.
  poll-interval:
    type: integer
    default: 30
    description: Seconds between poll attempts.
  max-wait:
    type: integer
    default: 300
    description: Max seconds to wait.
  fail-on-error:
    type: boolean
    default: true
    description: >
      Deprecated — use block-on instead.
  block-on:
    type: string
    default: ""
    description: >
      Which risk tiers cause the job to exit
      non-zero: low+, medium+, high+, or
      none. When left unset the Monte Carlo
      UI setting applies.
  fail-on:
    type: string
    default: ""
    description: >
      Deprecated — use block-on instead.

steps:
  - assess:
      api-url: << parameters.api-url >>
      poll-interval: << parameters.poll-interval >>
      max-wait: << parameters.max-wait >>
      fail-on-error: << parameters.fail-on-error >>
      block-on: << parameters.block-on >>
      fail-on: << parameters.fail-on >>
