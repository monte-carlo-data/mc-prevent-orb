description: >
  Basic usage — MC Prevent runs on every PR and warns/fails on risky changes.

usage:
  version: 2.1

  orbs:
    mc-prevent: monte-carlo/mc-prevent-orb@1

  workflows:
    main:
      jobs:
        - mc-prevent/assess:
            context:
              - monte-carlo  # Must contain MCD_DEFAULT_API_ID and MCD_DEFAULT_API_TOKEN
            filters:
              branches:
                ignore:
                  - main
                  - master
