description: >
  Non-blocking setup — CI always passes, verdict visible in job output and check run only.

usage:
  version: 2.1

  orbs:
    mc-prevent: monte-carlo/mc-prevent-orb@1

  workflows:
    main:
      jobs:
        - mc-prevent/assess:
            poll-interval: 15
            max-wait: 120
            fail-on-error: false
            context:
              - monte-carlo
            filters:
              branches:
                ignore:
                  - main
