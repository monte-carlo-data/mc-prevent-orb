---
description: >
  Only block on high-risk PRs. Medium and
  low risk show in output but don't block.

usage:
  version: 2.1

  orbs:
    mc-prevent: https://raw.githubusercontent.com/monte-carlo-data/mc-prevent-orb/main/orb.yml

  workflows:
    main:
      jobs:
        - mc-prevent/assess:
            name: mc-prevent
            block-on: high+
            context:
              - monte-carlo
            filters:
              branches:
                ignore:
                  - main
