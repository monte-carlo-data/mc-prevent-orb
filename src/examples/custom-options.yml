---
description: >
  Only block on fail verdicts. Warnings
  show in output but don't break CI.

usage:
  version: 2.1

  orbs:
    mc-prevent: https://raw.githubusercontent.com/monte-carlo-data/mc-prevent-orb/main/orb.yml

  workflows:
    main:
      jobs:
        - mc-prevent/assess:
            name: mc-prevent
            fail-on: fail_only
            context:
              - monte-carlo
            filters:
              branches:
                ignore:
                  - main
